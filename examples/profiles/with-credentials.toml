# Profile demonstrating credential management.
# Credentials are resolved at build time from env vars or source commands.
[profile]
name = "with-credentials"
description = "Profile with credential declarations"

[settings]
model = "us.anthropic.claude-opus-4-6-v1[1m]"

[settings.permissions]
allow = ["Read", "Glob", "Grep"]

# Required credentials — resolved at build time, emitted into .env.claude
[[credentials]]
name = "anthropic-api-key"
env_var = "ANTHROPIC_API_KEY"
description = "Anthropic API key for Claude Code"
# Optional source command (1Password, AWS SSM, etc.):
# source = "op read 'op://Dev/Anthropic/api-key'"

[[credentials]]
name = "github-token"
env_var = "GITHUB_TOKEN"
description = "GitHub token for gh CLI and MCP"
# source = "gh auth token"

[[credentials]]
name = "optional-sentry"
env_var = "SENTRY_DSN"
description = "Sentry DSN for error tracking"
optional = true  # won't fail if missing
