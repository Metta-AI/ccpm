# Git and GitHub CLI read access.
# Extend this for any profile that needs to inspect repos.
[profile]
name = "git-permissions"
description = "Git and GitHub CLI read access"

[settings.permissions]
allow = [
    "Bash(git status:*)",
    "Bash(git diff:*)",
    "Bash(git log:*)",
    "Bash(git branch)",
    "Bash(git branch --list:*)",
    "Bash(git branch -a)",
    "Bash(git branch -r)",
    "Bash(gh pr view:*)",
    "Bash(gh pr list:*)",
    "Bash(gh pr diff:*)",
    "Bash(gh pr checks:*)",
    "Bash(gh issue view:*)",
    "Bash(gh issue list:*)",
    "Bash(gh run view:*)",
    "Bash(gh run list:*)",
]
